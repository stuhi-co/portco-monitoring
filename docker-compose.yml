services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portco
      POSTGRES_PASSWORD: portco
      POSTGRES_DB: portco_monitoring
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portco -d portco_monitoring"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://portco:portco@db:5432/portco_monitoring
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
