services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portco}
      POSTGRES_DB: ${POSTGRES_DB:-portco_monitoring}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portco} -d ${POSTGRES_DB:-portco_monitoring}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portco}:${POSTGRES_PASSWORD:-portco}@db:5432/${POSTGRES_DB:-portco_monitoring}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./src/frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
